<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      min-height: 120px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1c1c1e;
      color: #f2f2f7;
    }
    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-bottom: 1px solid #3a3a3c;
    }
    .header-title { font-size: 12px; font-weight: 600; letter-spacing: 0.03em; }
    .empty { padding: 24px 12px; text-align: center; color: #636366; line-height: 1.5; }
    .annotation { padding: 12px; }
    .screenshot {
      width: 100%; height: 80px; object-fit: cover; border-radius: 6px;
      border: 1px solid #3a3a3c; margin-bottom: 10px; background: #2c2c2e;
    }
    .meta { margin-bottom: 10px; }
    .url { font-size: 11px; color: #8e8e93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .element-label { font-size: 12px; color: #f2f2f7; font-weight: 500; }
    .note-label { font-size: 11px; color: #8e8e93; margin-bottom: 4px; }
    textarea {
      width: 100%; padding: 8px; border-radius: 6px;
      border: 1px solid #3a3a3c; background: #2c2c2e; color: #f2f2f7;
      font-size: 12px; font-family: inherit; resize: none; outline: none;
      line-height: 1.4;
    }
    textarea:focus { border-color: rgba(196, 95, 40, 0.6); }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    button {
      flex: 1; padding: 8px; border-radius: 6px; border: none;
      font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
    }
    .btn-primary { background: #c45f28; color: #fff; }
    .btn-primary:hover { background: #d4722f; }
    .btn-secondary { background: #2c2c2e; color: #8e8e93; border: 1px solid #3a3a3c; }
    .btn-secondary:hover { color: #f2f2f7; }
    .errors { margin-top: 8px; }
    .error-badge {
      display: inline-block; padding: 2px 6px; border-radius: 4px;
      font-size: 10px; background: rgba(255, 69, 58, 0.15); color: #ff453a;
      margin-right: 4px;
    }
    .status { padding: 12px; text-align: center; color: #30d158; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <rect x="1" y="2" width="12" height="1.5" rx="0.75" fill="#c45f28"/>
      <rect x="1" y="6.25" width="9" height="1.5" rx="0.75" fill="#c45f28"/>
      <rect x="1" y="10.5" width="10.5" height="1.5" rx="0.75" fill="#c45f28"/>
    </svg>
    <span class="header-title">Queue</span>
  </div>
  <div id="root"></div>
  <script src="popup.js"></script>
</body>
</html>
